<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2026年深地空间技术学术交流会</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f3f3f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      position: relative;
      width: min(100vw, 596px);
      min-height: 100vh;
      background: #fff;
      overflow: hidden;
    }

    .page-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .hotspot:focus-visible {
      outline: 3px solid #d5393c;
      outline-offset: 3px;
    }

    .schedule-card {
      left: 7.38%;
      top: 42.42%;
      width: 42.11%;
      height: 10.82%;
    }
  </style>
</head>
<body>
  <main class="page" aria-label="2026年深地空间技术学术交流会首页">
    <img class="page-image" src="index.png" alt="2026年深地空间技术学术交流会，热烈欢迎您" />
    <a class="hotspot schedule-card" href="schedule.html" aria-label="查看活动行程"></a>
  </main>
</body>
<script>
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    // 如果没有 code，且在微信环境中，则跳转授权
    if (!code && /MicroMessenger/i.test(navigator.userAgent)) {
      const appid = 'wx5d4ebaabb750dae1'; // 你的 appID
      const redirectUri = encodeURIComponent(window.location.href);
      const scope = 'snsapi_userinfo';

      window.location.href = `https://open.weixin.qq.com/connect/oauth2/authorize?appid=${appid}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}&state=STATE#wechat_redirect`;
    }
  })();
</script>
</html>
